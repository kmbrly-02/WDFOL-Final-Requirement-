     <nav class="navbar">

                <img src="img/logo.png" alt="Logo" class="nav-logo">
            </a>

    <main class="contact-wrapper">
        <h1 class="contact-title">Contact Me!</h1>
        <p class="contact-subtitle">If you have any inquiries or just want to say hi, please use the contact form below.</p>
        <p class="contact-highlight">I’d like to hear from you!</p>

        <form class="contact-form">
            <div class="form-row">
                <div class="form-group">
                    <label>First Name</label>
                    <input type="text" name="firstname">
                </div>
                <div class="form-group">
                    <label>Last Name</label>
                    <input type="text" name="lastname">
                </div>
            </div>

            <div class="form-group full-width">
                <label>Email *</label>
                <input type="email" name="email" required>
            </div>

            <div class="form-group full-width">
                <label>Message</label>
                <textarea name="message"></textarea>
            </div>

            <div class="btn-container">
                <button type="submit" class="send-btn">Send</button>
            </div>
        </form>
    </main>

    <footer class="footer">
        <div class="container footer-content">
            <p>© All Rights Reserved. Created by Kimberly Clarisse Puno</p>

                <a href="#" class="social-link"><img src="img/linkedin-icon.jpg" alt="LinkedIn"></a>
            </div>
        </div>
    </footer>

    </script>

</body>
